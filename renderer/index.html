<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Virtual Observatory — relocated sky (0d)</title>
    <style>
      html, body { margin: 0; height: 100%; background: #03040a; overflow: hidden; color: #cdd6e6;
        font: 12px/1.5 ui-monospace, Menlo, Consolas, monospace; }
      #hud { position: fixed; top: 10px; left: 12px; pointer-events: none; text-shadow: 0 0 4px #000; }
      #hud b { color: #eef2fb; }
      #pick { position: fixed; bottom: 60px; left: 12px; color: #cfe8ff; text-shadow: 0 0 5px #000; min-height: 1.4em; }
      #bar { position: fixed; left: 0; right: 0; bottom: 0; padding: 9px 14px; display: flex;
        gap: 12px; align-items: center; background: linear-gradient(transparent, #03040aee 45%); }
      #bar input[type=range] { flex: 1; }
      #bar button, #bar select { background: #16223a; color: #cdd6e6; border: 1px solid #2b3e62;
        border-radius: 5px; padding: 4px 10px; cursor: pointer; font: inherit; }
      #clock { min-width: 150px; color: #eef2fb; }
      #err { position: fixed; inset: 0; display: none; place-content: center; color: #ff9;
        text-align: center; padding: 2rem; }
    </style>
  </head>
  <body>
    <div id="hud">loading…</div>
    <div id="pick"></div>
    <div id="err"></div>
    <div id="bar">
      <button id="play">▶ play</button>
      <span id="clock">t = 0 yr</span>
      <input id="time" type="range" min="0" max="1000" value="0" step="1" />
      <label>scale
        <select id="scale">
          <option value="100">±100 yr</option>
          <option value="10000">±10 kyr</option>
          <option value="100000" selected>±100 kyr</option>
        </select>
      </label>
      <button id="reset">reset</button>
    </div>
    <script type="importmap">
      { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
